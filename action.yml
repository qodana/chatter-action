name: 'chatter'
description: >-
  AI attribution for commits: PR reports and computed trace notes after squash or rebase merges.
author: 'JetBrains'

inputs:
  mode:
    description: 'auto | pr | mainline. auto selects from the GitHub event.'
    default: 'auto'
  base-url:
    description: 'Optional full Chatter release URL override; install.sh remains the source of the pinned release and checksums.'
    default: ''
  notes-ref:
    description: >-
      Optional notes ref confirmation. Empty derives refs/notes/chatter for rollout or
      refs/notes/wal-chatter for wal; a conflicting value fails the action.
    default: ''
  filter:
    description: 'chatter instance: rollout | wal'
    default: 'rollout'
  comment:
    description: 'Post/update a sticky PR comment with the report (pr mode; needs pull-requests: write).'
    default: 'true'
  check:
    description: 'Publish a detailed Chatter attribution check run (pr mode; needs checks: write).'
    default: 'true'
  github-token:
    description: 'Token used to update the optional PR report comment and check run.'
    default: ${{ github.token }}
    required: false
  predict:
    description: 'Opt-in diagnostic preview of GitHub test-merge attribution (pr mode; never published).'
    default: 'false'
  push-notes:
    description: 'Push computed notes to origin (mainline mode; needs contents: write).'
    default: 'true'
  extensions:
    description: 'Comma-separated file extensions for the PR blame report (empty = all changed files).'
    default: ''

outputs:
  method:
    description: 'Mapping method used in mainline mode.'
  ai-lines:
    description: 'AI-attributed lines across changed files in pr mode.'
  predicted-ai-lines:
    description: 'AI-attributed lines on the optional test-merge prediction.'
  total-lines:
    description: 'Total lines across the PR report scope.'
  notes-coverage:
    description: 'Branch commits with readable published notes, as X/Y.'
  report-path:
    description: 'Path to generated PR report markdown.'

runs:
  using: 'node20'
  main: 'dist/index.js'
