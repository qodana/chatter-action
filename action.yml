name: 'chatter'
description: >-
  AI attribution for commits: predictive agent trace on pull requests,
  computed trace notes on the mainline after squash/rebase merges.
author: 'JetBrains'

inputs:
  mode:
    description: 'auto | pr | mainline. auto picks by event: pull_request closed+merged / push -> mainline, other pull_request events -> pr.'
    default: 'auto'
  chatter-version:
    description: 'Pinned chatter release (sha256-verified; only versions known to this action are accepted)'
    default: '37-26e21a'
  base-url:
    description: 'CDN base URL override (internal mirror); the archive must match the pinned sha256'
    default: 'https://download.jetbrains.com/qodana/chatter'
  notes-ref:
    description: >-
      Trace notes ref override. Empty (default) derives it from the filter — refs/notes/chatter
      for rollout, refs/notes/wal-chatter for wal — matching what the chatter CLI itself reads
      and writes; a value that contradicts the filter fails the action.
    default: ''
  filter:
    description: 'chatter instance: rollout | wal'
    default: 'rollout'
  comment:
    description: 'Post/update a sticky PR comment with the report (pr mode; needs pull-requests: write)'
    default: 'true'
  predict:
    description: 'Add the explicitly-labeled prediction section, computed on the real refs/pull/N/merge test-merge commit (pr mode)'
    default: 'true'
  push-notes:
    description: 'Push computed notes to origin (mainline mode; needs contents: write)'
    default: 'true'
  extensions:
    description: 'Comma-separated file extensions for the blame report (empty = all changed files)'
    default: ''

outputs:
  method:
    description: 'Mapping method used in mainline mode (MERGE_PARENTS/SQUASH_VIA_PR/PATCH_ID/PR_CONTENT/CHERRY_TRAILER/IDENTITY/UNKNOWN)'
    value: ${{ steps.run.outputs.method }}
  ai-lines:
    description: 'AI-attributed lines across the changed files at the real PR head (pr mode, factual)'
    value: ${{ steps.run.outputs.ai-lines }}
  predicted-ai-lines:
    description: 'AI-attributed lines on the test-merge commit (pr mode, prediction section)'
    value: ${{ steps.run.outputs.predicted-ai-lines }}
  total-lines:
    description: 'Total lines across the report scope (pr mode)'
    value: ${{ steps.run.outputs.total-lines }}
  notes-coverage:
    description: 'Branch commits with published notes, as "X/Y"'
    value: ${{ steps.run.outputs.notes-coverage }}
  report-path:
    description: 'Path to the generated markdown report (pr mode)'
    value: ${{ steps.run.outputs.report-path }}

runs:
  using: 'composite'
  steps:
    - id: install
      shell: bash
      run: '"${GITHUB_ACTION_PATH}/scripts/install-chatter.sh"'
      env:
        CHATTER_VERSION: ${{ inputs.chatter-version }}
        CHATTER_BASE_URL: ${{ inputs.base-url }}
    - id: run
      shell: bash
      run: '"${GITHUB_ACTION_PATH}/scripts/run.sh"'
      env:
        CHATTER_BIN: ${{ steps.install.outputs.bin }}
        CHATTER_ACTION_MODE: ${{ inputs.mode }}
        CHATTER_NOTES_REF: ${{ inputs.notes-ref }}
        CHATTER_FILTER: ${{ inputs.filter }}
        CHATTER_COMMENT: ${{ inputs.comment }}
        CHATTER_PREDICT: ${{ inputs.predict }}
        CHATTER_PUSH_NOTES: ${{ inputs.push-notes }}
        CHATTER_EXTENSIONS: ${{ inputs.extensions }}
        GH_TOKEN: ${{ github.token }}
