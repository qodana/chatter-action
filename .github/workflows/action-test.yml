name: Chatter action e2e

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'action.yml'
      - 'src/**'
      - 'dist/**'
      - 'package.json'
      - 'package-lock.json'
      - 'install.sh'
      - 'uninstall.sh'
      - 'test/**'
      - 'integration/**'
      - 'README.md'
      - '.github/workflows/action-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: release hook → bundled action → online blame
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: git diff --exit-code -- dist
      - run: bash -n integration/github-demo/*.sh
      - run: npm test
